# ============================================================
#  postgresql.hml.conf — Configurações para Homologação
#  Vext CRM v2.1.0
# ============================================================

# ---------- Conexões ----------
max_connections = 50                  # Homologação não precisa de centenas
listen_addresses = '*'                # Aceita conexões de qualquer interface

# ---------- Memória ----------
shared_buffers = 128MB                # ~25% da RAM disponível no container
effective_cache_size = 256MB
work_mem = 4MB
maintenance_work_mem = 64MB

# ---------- WAL / Durabilidade ----------
wal_level = replica
fsync = on
synchronous_commit = on

# ---------- Logging (detalhado para hml) ----------
log_destination = 'stderr'
logging_collector = off               # Docker captura stderr nativamente
log_min_messages = info
log_min_error_statement = error
log_duration = on                     # Loga duração de todas as queries
log_statement = 'ddl'                 # Loga apenas DDL (CREATE, ALTER, DROP)
log_line_prefix = '%t [%p] [%d] %u '  # timestamp | pid | database | user
log_timezone = 'America/Sao_Paulo'

# ---------- Localização ----------
timezone = 'America/Sao_Paulo'
datestyle = 'iso, dmy'
lc_messages = 'en_US.utf8'
lc_monetary = 'pt_BR.utf8'
lc_numeric = 'pt_BR.utf8'
lc_time = 'pt_BR.utf8'
default_text_search_config = 'pg_catalog.portuguese'

# ---------- Performance ----------
checkpoint_completion_target = 0.9
random_page_cost = 1.1
effective_io_concurrency = 200
